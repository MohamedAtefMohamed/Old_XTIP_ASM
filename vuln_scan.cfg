#!/usr/bin/env bash
# =============================================================================
#  vuln_scan.cfg  —  Old_XTIP_ASM Vulnerability Scanning Configuration
#  Mirrors the vuln-relevant subset of XTIP_ASM_v2.0/asm_discovery.cfg
# =============================================================================

# ---------------------------------------------------------------------------
# PATHS
# ---------------------------------------------------------------------------
SCRIPTPATH="$( cd "$(dirname "${BASH_SOURCE[0]}")" >/dev/null 2>&1; pwd -P )"
ASSET_JSON="${SCRIPTPATH}/asm_asset.json"   # Discovery output — source of truth
WORKSPACE="${SCRIPTPATH}/scan_workspace"    # All scan artefacts go here
TOOLS_DIR="${HOME}/Tools"                   # Installed tools root (same as v2.0)
NUCLEI_TEMPLATES_PATH="${HOME}/nuclei-templates"

# ---------------------------------------------------------------------------
# MODULE TOGGLES  (set false to disable a phase)
# ---------------------------------------------------------------------------
# Phase 0 — URL discovery
URL_DISCOVERY=true
CRAWL_KATANA=true          # Active crawl with katana
CRAWL_WAYBACKURLS=true     # Passive historical URLs
GF_CLASSIFY=true           # Run gf pattern classifier

# Phase 1 — Target preparation  (always required)
TARGET_PREP=true

# Phase 2 — Technology routing  (required for tech-specific scanners)
TECH_ROUTING=true

# Phase 3 — Web misconfiguration
CORS_CHECK=true
OPEN_REDIRECT=true
HOST_HEADER_INJECTION=true
CRLF_CHECKS=true
WEBCACHE=true

# Phase 4 — DAST parameter fuzzing
XSS=true
SSRF_CHECKS=true
LFI=true
SSTI=true
SQLI=true
SQLMAP=true
GHAURI=false
COMM_INJ=true

# Phase 5 — Network / crypto
TEST_SSL=true
NUCLEICHECK=true         # Generic nuclei sweep
NUCLEI_DAST=true         # Dedicated nuclei -dast pass
API_KEY_VALIDATION=true  # TruffleHog secret validation

# Phase 6 — Technology-specific scanners
ADAPTIVE_TECH_SCANNING=true

# Phase 7 — Access control
BYPASSER4XX=true
SMUGGLING=true
SPRAYING=false           # Password spraying — disabled by default (intrusive)

# Phase 8 — Reporting (always runs)
GENERATE_REPORTS=true

# ---------------------------------------------------------------------------
# DEEP MODE  — disable limits, scan everything
# ---------------------------------------------------------------------------
DEEP=false
DEEP_LIMIT=500           # Max URLs before skipping a module (unless DEEP)
DEEP_LIMIT2=1500         # Second limit for heavier modules

# ---------------------------------------------------------------------------
# URL DISCOVERY SETTINGS
# ---------------------------------------------------------------------------
KATANA_DEPTH=3
KATANA_THREADS=25
KATANA_TIMEOUT=300          # seconds per target
KATANA_RATE_LIMIT=150
KATANA_HEADLESS=false       # set true for JavaScript-rendered apps (slow)
WAYBACKURLS_LIMIT=10000     # max URLs per domain from waybackurls (0=unlimited)

# ---------------------------------------------------------------------------
# NUCLEI SETTINGS
# ---------------------------------------------------------------------------
NUCLEI_SEVERITY="info,low,medium,high,critical"
NUCLEI_RATELIMIT=150
NUCLEI_EXTRA_ARGS=""
NUCLEI_DAST_EXTRA_ARGS=""
NUCLEI_DAST_DEDUP=true      # deduplicate DAST targets before scanning

# ---------------------------------------------------------------------------
# TOOL SETTINGS
# ---------------------------------------------------------------------------
HTTPX_THREADS=50
HTTPX_RATELIMIT=150
HTTPX_TIMEOUT=10

FFUF_THREADS=40
FFUF_RATELIMIT=0

DALFOX_THREADS=30
SQLMAP_THREADS=4
INTERLACE_THREADS=10
BRUTESPRAY_CONCURRENCE=4
TLSX_THREADS=500

# ---------------------------------------------------------------------------
# RATE LIMITS & TIMEOUTS
# ---------------------------------------------------------------------------
SSRF_CALLBACK_WAIT=15     # seconds to wait for OOB callbacks
TOOL_TIMEOUT=3600         # max seconds per individual tool invocation
PARALLEL_MAX_JOBS=4       # concurrent scanner jobs

# ---------------------------------------------------------------------------
# WORDLISTS
# ---------------------------------------------------------------------------
DATA_DIR="${SCRIPTPATH}/data"
WORDLISTS_DIR="${DATA_DIR}/wordlists"
LFI_WORDLIST="${WORDLISTS_DIR}/lfi_wordlist.txt"
FUZZ_WORDLIST="${WORDLISTS_DIR}/fuzz_wordlist.txt"
HEADERS_INJECT="${WORDLISTS_DIR}/headers_inject.txt"

# ---------------------------------------------------------------------------
# OOB / COLLAB SERVER (for SSRF/XXE callbacks)
# ---------------------------------------------------------------------------
COLLAB_SERVER="${COLLAB_SERVER:-}"   # e.g. "oast.pro" — leave blank to auto-start interactsh

# ---------------------------------------------------------------------------
# SCANNER API TOKENS
# ---------------------------------------------------------------------------
WPSCAN_API_TOKEN="${WPSCAN_API_TOKEN:-}"

# ---------------------------------------------------------------------------
# SEVERITY COLOURS (terminal)
# ---------------------------------------------------------------------------
bred='\033[1;31m'
bblue='\033[1;34m'
bgreen='\033[1;32m'
byellow='\033[1;33m'
red='\033[0;31m'
blue='\033[0;34m'
green='\033[0;32m'
cyan='\033[0;36m'
yellow='\033[0;33m'
reset='\033[0m'

# ---------------------------------------------------------------------------
# HEADER sent with every HTTP request
# ---------------------------------------------------------------------------
HEADER="User-Agent: Mozilla/5.0 (X11; Linux x86_64; rv:128.0) Gecko/20100101 Firefox/128.0"
COOKIE_HEADER="${COOKIE_HEADER:-}"   # raw cookie (no "Cookie:" prefix)
